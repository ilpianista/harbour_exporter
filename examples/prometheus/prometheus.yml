global:
  scrape_interval: 1h
  scrape_timeout: 30s
  evaluation_interval: 1m

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: harbour-exporter
    static_configs:
      - targets:
          - harbour-exporter:9101
